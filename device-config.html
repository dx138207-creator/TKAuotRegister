<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>多设备启动面板</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        color: #222;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 22px;
      }
      .tip {
        color: #666;
        margin-bottom: 12px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        margin-bottom: 12px;
      }
      th, td {
        border: 1px solid #ddd;
        padding: 8px;
        text-align: left;
      }
      th {
        background: #f5f7fa;
      }
      input {
        width: 100%;
        box-sizing: border-box;
        padding: 6px;
      }
      .actions {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      button {
        padding: 8px 12px;
        border: 1px solid #bbb;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #1677ff;
        border-color: #1677ff;
        color: #fff;
      }
      textarea {
        width: 100%;
        min-height: 280px;
        box-sizing: border-box;
        font-family: Consolas, monospace;
        font-size: 12px;
        padding: 8px;
      }
      .status {
        font-size: 12px;
        margin-top: 6px;
        color: #555;
      }
      .status.running {
        color: #0958d9;
      }
      .status.ok {
        color: #067647;
      }
      .status.fail {
        color: #b42318;
      }
      .warn {
        color: #b54708;
        margin: 8px 0;
      }
      .ok {
        color: #067647;
        margin: 8px 0;
      }
    </style>
  </head>
  <body>
    <h1>多设备启动面板</h1>
    <div class="tip">
      先在终端执行 <code>npm run panel</code>（或 <code>node device-panel-server.js</code>）后，通过本页逐行点击“注册/二次注册”即可运行对应手机脚本。
    </div>

    <table id="deviceTable">
      <thead>
        <tr>
          <th style="width: 4%">序号</th>
          <th style="width: 14%">endpoint (ip:port)</th>
          <th style="width: 8%">adbPassword</th>
          <th style="width: 18%">邮箱(多行)</th>
          <th style="width: 16%">密码(多行)</th>
          <th style="width: 14%">运行状态</th>
          <th style="width: 20%">操作</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="actions">
      <button id="addRow">新增一行</button>
      <button id="uploadExcel">上传文件读取10组账号</button>
      <button id="startAll" class="primary">全部注册</button>
      <button id="clear">清空全部</button>
    </div>
    <input id="excelFile" type="file" accept=".xlsx,.xls" style="display:none" />

    <div id="msg"></div>

    <script src="/vendor/xlsx.min.js"></script>
    <script>
      const tbody = document.querySelector("#deviceTable tbody");
      const msg = document.querySelector("#msg");

      function parseMultiLineValues(text) {
        return String(text || "")
          .split(/\r?\n/)
          .map((s) => s.trim())
          .filter(Boolean);
      }

      function setRowStatus(tr, text, cls = "") {
        const el = tr.querySelector('[data-runtime="1"]');
        el.textContent = text;
        el.className = `status${cls ? " " + cls : ""}`;
      }

      function syncAccountSelect(tr) {
        const emails = parseMultiLineValues(tr.querySelector('textarea[data-key="email"]').value);
        const passwords = parseMultiLineValues(
          tr.querySelector('textarea[data-key="googlePassword"]').value
        );
        const count = Math.min(emails.length, passwords.length);
        const select = tr.querySelector('select[data-account-select="1"]');
        const old = select.value;
        select.innerHTML = "";
        if (count <= 0) {
          const opt = document.createElement("option");
          opt.value = "";
          opt.textContent = "无可用账号";
          select.appendChild(opt);
          select.disabled = true;
          return;
        }
        select.disabled = false;
        for (let i = 0; i < count; i++) {
          const opt = document.createElement("option");
          opt.value = String(i);
          opt.textContent = `${i + 1}. ${emails[i]}`;
          select.appendChild(opt);
        }
        if (old && Number(old) < count) {
          select.value = old;
        }
      }

      function getRowDevice(tr) {
        const data = {};
        tr.querySelectorAll("input, textarea").forEach((el) => {
          data[el.dataset.key] = el.value.trim();
        });
        return data;
      }

      function getSelectedAccount(tr, data) {
        const emails = parseMultiLineValues(data.email);
        const passwords = parseMultiLineValues(data.googlePassword);
        const idx = Number(tr.querySelector('select[data-account-select="1"]').value);
        if (!Number.isInteger(idx) || idx < 0 || idx >= emails.length || idx >= passwords.length) {
          return null;
        }
        return { email: emails[idx], googlePassword: passwords[idx], index: idx };
      }

      function validateOne(tr, data) {
        if (!data.endpoint || !/^[^:]+:\d+$/.test(data.endpoint)) {
          return "endpoint 格式错误，应为 ip:port";
        }
        if (!data.adbPassword) return "adbPassword 不能为空";
        if (!getSelectedAccount(tr, data)) return "请选择有效账号（邮箱/密码行数需对应）";
        return "";
      }

      function resetRowToReady(tr, statusText = "已断开，可重新启动") {
        const startBtn = tr.querySelector('[data-start="1"]');
        const startSecondBtn = tr.querySelector('[data-start-second="1"]');
        const stopBtn = tr.querySelector('[data-stop="1"]');
        const select = tr.querySelector('select[data-account-select="1"]');
        startBtn.disabled = false;
        startSecondBtn.disabled = false;
        startBtn.textContent = "启动";
        startSecondBtn.textContent = "二次启动";
        stopBtn.disabled = true;
        select.disabled = false;
        delete tr.dataset.runId;
        setRowStatus(tr, statusText, "ok");
      }

      async function pollRunStatus(runId, tr) {
        for (let i = 0; i < 900; i++) {
          await new Promise((r) => setTimeout(r, 1500));
          const res = await fetch(`/api/status?id=${encodeURIComponent(runId)}`);
          if (!res.ok) {
            setRowStatus(tr, "查询状态失败", "fail");
            return;
          }
          const data = await res.json();
          if (data.status === "finished") {
            resetRowToReady(tr, data.exitCode === 0 ? "已完成，可重新启动" : "已结束，可重新启动");
            tr.title = data.logFile || "";
            return;
          }
          if (data.status === "stopping") {
            setRowStatus(tr, "停止中...", "running");
          } else if (data.runtimeStatus) {
            setRowStatus(tr, String(data.runtimeStatus).slice(0, 80), "running");
            tr.title = `端口: ${data.appiumPort}\n日志: ${data.logFile || ""}\n${data.runtimeStatus || ""}`;
          }
        }
        setRowStatus(tr, "状态轮询超时", "fail");
      }

      async function startRow(tr, runMode = "register") {
        const data = getRowDevice(tr);
        const err = validateOne(tr, data);
        if (err) {
          setRowStatus(tr, err, "fail");
          return;
        }
        const selected = getSelectedAccount(tr, data);
        const requestDevice = {
          ...data,
          email: selected.email,
          googlePassword: selected.googlePassword
        };

        const startBtn = tr.querySelector('[data-start="1"]');
        const startSecondBtn = tr.querySelector('[data-start-second="1"]');
        const stopBtn = tr.querySelector('[data-stop="1"]');
        const select = tr.querySelector('select[data-account-select="1"]');
        startBtn.disabled = true;
        startSecondBtn.disabled = true;
        startBtn.textContent = runMode === "register" ? "运行中..." : "启动";
        startSecondBtn.textContent = runMode === "register-second" ? "运行中..." : "二次启动";
        stopBtn.disabled = false;
        select.disabled = true;
        setRowStatus(
          tr,
          `提交${runMode === "register" ? "启动" : "二次启动"}请求... 使用账号第 ${selected.index + 1} 行`,
          "running"
        );

        try {
          const resp = await fetch("/api/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ device: requestDevice, runMode })
          });
          const result = await resp.json();
          if (!resp.ok) {
            setRowStatus(
              tr,
              `${runMode === "register" ? "启动" : "二次启动"}失败: ${result.error || "未知错误"}`,
              "fail"
            );
            startBtn.disabled = false;
            startSecondBtn.disabled = false;
            startBtn.textContent = "启动";
            startSecondBtn.textContent = "二次启动";
            stopBtn.disabled = true;
            select.disabled = false;
            return;
          }
          tr.dataset.runId = result.id;
          setRowStatus(
            tr,
            `已${runMode === "register" ? "启动" : "二次启动"}(pid=${result.pid}) | p${result.appiumPort}`,
            "running"
          );
          tr.title = result.logFile || "";
          pollRunStatus(result.id, tr);
        } catch (e) {
          setRowStatus(
            tr,
            `${runMode === "register" ? "启动" : "二次启动"}异常: ${e.message}`,
            "fail"
          );
          startBtn.disabled = false;
          startSecondBtn.disabled = false;
          startBtn.textContent = "启动";
          startSecondBtn.textContent = "二次启动";
          stopBtn.disabled = true;
          select.disabled = false;
        }
      }

      async function stopRow(tr) {
        const runId = String(tr.dataset.runId || "").trim();
        if (!runId) {
          setRowStatus(tr, "当前行没有运行中的任务", "fail");
          return;
        }
        const stopBtn = tr.querySelector('[data-stop="1"]');
        stopBtn.disabled = true;
        setRowStatus(tr, "正在发送停止请求...", "running");
        try {
          const resp = await fetch("/api/stop", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ id: runId })
          });
          const result = await resp.json();
          if (!resp.ok) {
            setRowStatus(tr, `停止失败: ${result.error || "未知错误"}`, "fail");
            stopBtn.disabled = false;
            return;
          }
          setRowStatus(tr, "停止请求已发送，等待进程退出...", "running");
        } catch (e) {
          setRowStatus(tr, `停止异常: ${e.message}`, "fail");
          stopBtn.disabled = false;
        }
      }

      async function forceDisconnectRow(tr) {
        const data = getRowDevice(tr);
        if (!data.endpoint || !/^[^:]+:\d+$/.test(data.endpoint)) {
          setRowStatus(tr, "endpoint 格式错误，无法断开", "fail");
          return;
        }
        const forceBtn = tr.querySelector('[data-force-disconnect="1"]');
        forceBtn.disabled = true;
        setRowStatus(tr, "正在强制断开...", "running");
        try {
          const resp = await fetch("/api/force-disconnect", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              id: String(tr.dataset.runId || "").trim(),
              endpoint: data.endpoint
            })
          });
          const result = await resp.json();
          if (!resp.ok) {
            setRowStatus(tr, `强制断开失败: ${result.error || "未知错误"}`, "fail");
            return;
          }
          resetRowToReady(tr, `已强制断开: ${String(result.adbDisconnectOutput || "").slice(0, 80)}`);
        } catch (e) {
          setRowStatus(tr, `强制断开异常: ${e.message}`, "fail");
        } finally {
          forceBtn.disabled = false;
        }
      }

      function createRow(device = {}) {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td data-row-index="1"></td>
          <td><input data-key="endpoint" placeholder="124.236.70.143:20523" value="${device.endpoint || ""}"></td>
          <td><input data-key="adbPassword" placeholder="adb密码" value="${device.adbPassword || ""}"></td>
          <td><textarea data-key="email" placeholder="每行一个邮箱">${device.email || ""}</textarea></td>
          <td><textarea data-key="googlePassword" placeholder="每行一个密码">${device.googlePassword || ""}</textarea></td>
          <td><div class="status" data-runtime="1">待启动</div></td>
          <td>
            <select data-account-select="1"></select>
            <button type="button" data-start="1" class="primary">启动</button>
            <button type="button" data-start-second="1">二次启动</button>
            <button type="button" data-stop="1" disabled>停止</button>
            <button type="button" data-force-disconnect="1">刷新断开</button>
            <button type="button" data-remove="1">删除</button>
          </td>
        `;
        tr.querySelector('[data-remove="1"]').addEventListener("click", () => {
          tr.remove();
          if (!tbody.children.length) createRow();
          refreshRowIndices();
        });
        tr.querySelector('[data-start="1"]').addEventListener("click", () => startRow(tr, "register"));
        tr.querySelector('[data-start-second="1"]').addEventListener("click", () =>
          startRow(tr, "register-second")
        );
        tr.querySelector('[data-stop="1"]').addEventListener("click", () => stopRow(tr));
        tr.querySelector('[data-force-disconnect="1"]').addEventListener("click", () =>
          forceDisconnectRow(tr)
        );
        tr.querySelector('textarea[data-key="email"]').addEventListener("input", () => syncAccountSelect(tr));
        tr
          .querySelector('textarea[data-key="googlePassword"]')
          .addEventListener("input", () => syncAccountSelect(tr));
        tbody.appendChild(tr);
        syncAccountSelect(tr);
        refreshRowIndices();
      }

      function ensureRowCount(count) {
        while (tbody.querySelectorAll("tr").length < count) createRow();
      }

      function refreshRowIndices() {
        const rows = [...tbody.querySelectorAll("tr")];
        rows.forEach((row, idx) => {
          const cell = row.querySelector('[data-row-index="1"]');
          if (cell) {
            cell.textContent = String(idx + 1);
          }
        });
      }

      document.querySelector("#addRow").addEventListener("click", () => createRow());
      document.querySelector("#uploadExcel").addEventListener("click", () => {
        document.querySelector("#excelFile").click();
      });
      document.querySelector("#excelFile").addEventListener("change", async (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        if (typeof XLSX === "undefined") {
          msg.className = "warn";
          msg.textContent = "XLSX 解析库未加载，请刷新页面后重试。";
          return;
        }
        try {
          const buffer = await file.arrayBuffer();
          const workbook = XLSX.read(buffer, { type: "array" });
          const sheet = workbook.Sheets[workbook.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
          const maxCols = rows.reduce((m, r) => Math.max(m, Array.isArray(r) ? r.length : 0), 0);
          const columnGroups = [];
          let skipped = 0;

          for (let col = 0; col < maxCols; col++) {
            const pairs = [];
            for (let r = 0; r < rows.length; r++) {
              const cell = String((rows[r] || [])[col] || "").trim();
              if (!cell) break;
              const parts = cell.split(/\s*----\s*/).map((p) => String(p || "").trim());
              if (!parts[0] || !parts[1]) {
                skipped += 1;
                continue;
              }
              pairs.push({ email: parts[0], password: parts[1] });
            }
            if (pairs.length > 0) {
              columnGroups.push({ col, pairs });
            }
          }

          if (!columnGroups.length) {
            msg.className = "warn";
            msg.textContent = "文件中未发现符合 `email----googlePassword----...` 的列数据。";
            return;
          }

          ensureRowCount(columnGroups.length);
          const rowEls = [...tbody.querySelectorAll("tr")];
          columnGroups.forEach((group, idx) => {
            const tr = rowEls[idx];
            tr.querySelector('textarea[data-key="email"]').value = group.pairs.map((x) => x.email).join("\n");
            tr.querySelector('textarea[data-key="googlePassword"]').value = group.pairs
              .map((x) => x.password)
              .join("\n");
            syncAccountSelect(tr);
          });

          msg.className = "ok";
          msg.textContent = `已按列填充 ${columnGroups.length} 行账号数据（每列遇空白即停止）。${
            skipped ? ` 跳过 ${skipped} 条格式不匹配记录。` : ""
          }`;
        } catch (err) {
          msg.className = "warn";
          msg.textContent = `读取文件失败: ${String(err?.message || err)}`;
        } finally {
          e.target.value = "";
        }
      });

      document.querySelector("#startAll").addEventListener("click", async () => {
        const rows = [...tbody.querySelectorAll("tr")];
        for (const tr of rows) {
          const btn = tr.querySelector('[data-start="1"]');
          if (!btn.disabled) {
            await startRow(tr, "register");
            await new Promise((r) => setTimeout(r, 300));
          }
        }
      });

      document.querySelector("#clear").addEventListener("click", () => {
        tbody.innerHTML = "";
        createRow();
        msg.className = "";
        msg.textContent = "";
      });

      createRow({
        endpoint: "124.236.70.143:20523",
        adbPassword: "lqNM8dkn",
        email: "demo@rpilosj.com",
        googlePassword: "demoPwd"
      });
    </script>
  </body>
</html>
